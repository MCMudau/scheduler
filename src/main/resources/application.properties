spring.application.name=scheduler
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP connection pool - keep footprint small
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000


server.port=${PORT:8080}

brevo.api.key=${BREVO_API_KEY}

# Project Tracking Feature Configuration
project.upload.dir=${UPLOAD_DIR:./uploads}
server.servlet.multipart.max-file-size=50MB
server.servlet.multipart.max-request-size=50MB
spring.web.resources.static-locations=classpath:/static/,file:${UPLOAD_DIR:./uploads}/

quotation.pdf-dir=${UPLOAD_DIR:./uploads}/quotations

spring.mvc.static-path-pattern=/uploads/**
