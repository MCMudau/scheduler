spring.application.name=scheduler
spring.datasource.url=${DB_URL_MPHO}
spring.datasource.username=${DB_MPHO_USERNAME}
spring.datasource.password=${DB_MPHO_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP connection pool - keep footprint small
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000


server.port=${PORT:8080}

# ── Gmail SMTP ──────────────────────────────────────────────────────
# Use an App Password (not your Google account password).
# Generate one at: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Project Tracking Feature Configuration
project.upload.dir=${UPLOAD_DIR:./uploads}
server.servlet.multipart.max-file-size=50MB
server.servlet.multipart.max-request-size=50MB
spring.web.resources.static-locations=classpath:/static/,file:${UPLOAD_DIR:./uploads}/

quotation.pdf-dir=${UPLOAD_DIR:./uploads}/quotations

spring.mvc.static-path-pattern=/uploads/**
